<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mini Tower Defense</title>
<style>
  body {
    margin:0; background:#111; color:#fff;
    font-family:sans-serif; text-align:center;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:100vh;
    position:relative;
  }
  canvas { background:#222; display:block; margin:10px auto; border:2px solid #555; }
  #ui { margin-top:5px; }
  button { padding:6px 12px; margin:4px; cursor:pointer; }
  #slotBar { display:flex; gap:8px; justify-content:center; margin:8px auto; }
  #gameOverlay {
    display:none; position:fixed;
    top:0;left:0;width:100%;height:100%;
    z-index:30; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
  }
</style>
</head>
<body>

<div id="startScreen" style="position:fixed;width:100%;height:100%;background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;">
  <h1>Mini Tower Defense</h1>
  <button onclick="startGame()">게임 시작</button>
  <div style="margin-top:20px;">
    <button>🏆 업적</button>
    <button>📖 적 도감</button>
    <button onclick="toggleInventory()">🎒 인벤토리</button>
    <button>🛒 상점</button>
  </div>
  <div id="inventoryUI" style="display:none;margin-top:15px;background:#222;padding:10px;border:1px solid #555;">
    <h4>장착 타워 (최대 6)</h4>
    <div id="equipList"></div>
    <hr>
    <h4>🟩 지상 설치</h4>
    <button onclick="equipTower('fighter')">🗡 파이터</button>
    <button onclick="equipTower('cannon')">💣 대포</button>
    <button onclick="equipTower('torch')">🔥 횃불</button>
    <button onclick="equipTower('puppeteer')">🎭 인형술사</button>
    <h4>🟨 언덕 설치</h4>
    <button onclick="equipTower('archer')">🏹 궁수</button>
    <h4>🟥 특수 (길에 설치)</h4>
    <button onclick="equipTower('wire')">🪢 가시 와이어 <small style="color:#aaa">(10초 쿨타임)</small></button>
    <h4>🔒 엘리트</h4>
    <button disabled>🔒 준비중</button>
  </div>
</div>

<div id="gameOverlay">
  <div id="overlayMsg" style="font-size:52px;font-weight:bold;margin-bottom:12px;text-shadow:0 0 20px currentColor;"></div>
  <div id="overlaySubMsg" style="font-size:18px;margin-bottom:28px;color:#ddd;"></div>
  <button onclick="resetGame()" style="padding:12px 28px;font-size:16px;cursor:pointer;background:#333;color:#fff;border:2px solid #888;border-radius:6px;">시작 화면으로</button>
</div>

<canvas id="game" width="600" height="400"></canvas>

<div id="ui">
  <span>🌊 웨이브: <span id="wave">1</span>/15</span>
  <span> | ⏱ <span id="time">60</span>s</span>
  <span> | 골드: <span id="gold">100</span></span>
  <span> | 체력: <span id="hp">200</span></span>
  <span> | 타워: <span id="towerCount">0</span>/45</span>
  <br>
  <div id="slotBar"></div>
  <div id="speedBar" style="margin:6px auto;">
    <span style="font-size:13px;color:#aaa;">배속: </span>
    <button onclick="setSpeed(0)" id="spd0">⏸ 0배</button>
    <button onclick="setSpeed(1)" id="spd1" style="outline:2px solid #0f0;">▶ 1배</button>
    <button onclick="setSpeed(2)" id="spd2">▶▶ 2배</button>
    <button onclick="setSpeed(3)" id="spd3">▶▶▶ 3배</button>
  </div>
  <br>
  <button id="readyBtn" onclick="readyWave()" disabled>준비</button>
  <span id="readyTimer"></span>
</div>

<div id="bossBar" style="display:none;width:300px;height:20px;background:#444;margin:5px auto;">
  <div id="bossHp" style="height:100%;width:100%;background:red;"></div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let gold=100, hp=200, wave=1, timeLeft=60;
let placingType=null, gameStarted=false, selectedTower=null;
let waveStarted=false, preparing=false;
let spawnCount=0, spawnLimit=8;
let gameOver=false, gameSpeed=1;
let spawnTick=0, timeTick=0;
const TICK_INTERVAL=60;

const WIRE_COOLDOWN_FRAMES = 600;
let wireCoolTick = 0;

const equipped=[], towers=[], enemies=[], dolls=[], wires=[];
const PATH_BLOCK_RADIUS=15, TOWER_BLOCK_RADIUS=20, MAX_SLOTS=6;
let selectedSlot=-1;

const TOWER_META={
  fighter:   {label:'🗡', name:'파이터',   cost:50},
  archer:    {label:'🏹', name:'궁수',     cost:100},
  cannon:    {label:'💣', name:'대포',     cost:250},
  torch:     {label:'🔥', name:'횃불',     cost:200},
  puppeteer: {label:'🎭', name:'인형술사', cost:300},
  wire:      {label:'🪢', name:'가시 와이어', cost:80},
};

const path=[
  {x:50,y:200},{x:200,y:200},{x:200,y:100},
  {x:400,y:100},{x:400,y:300},{x:550,y:200}
];
const base=path[path.length-1];

const hillZones=[
  {x:150,y:160,r:25},{x:300,y:180,r:25},{x:440,y:220,r:25}
];

let mouseX=0, mouseY=0;
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=e.clientX-r.left; mouseY=e.clientY-r.top;
});

function setSpeed(s){
  gameSpeed=s;
  ['spd0','spd1','spd2','spd3'].forEach((id,i)=>{
    document.getElementById(id).style.outline=i===s?'2px solid #0f0':'';
  });
}

function isOnPath(x,y){
  for(let i=0;i<path.length-1;i++){
    const a=path[i],b=path[i+1];
    const dx=b.x-a.x,dy=b.y-a.y;
    const t=((x-a.x)*dx+(y-a.y)*dy)/(dx*dx+dy*dy);
    const c=Math.max(0,Math.min(1,t));
    if(Math.hypot(x-(a.x+c*dx),y-(a.y+c*dy))<PATH_BLOCK_RADIUS) return true;
  }
  return false;
}

function isTooCloseToTower(x,y){
  return towers.some(t=>Math.hypot(t.x-x,t.y-y)<TOWER_BLOCK_RADIUS);
}

function isTooCloseToWire(x,y){
  return wires.some(w=>Math.hypot(w.x-x,w.y-y)<TOWER_BLOCK_RADIUS);
}

function updateTowerCountUI(){
  document.getElementById('towerCount').textContent=towers.length+wires.length;
}

function showOverlay(type){
  gameOver=true; gameStarted=false;
  const overlay=document.getElementById('gameOverlay');
  const msg=document.getElementById('overlayMsg');
  const sub=document.getElementById('overlaySubMsg');
  if(type==='lose'){
    overlay.style.background='rgba(60,0,0,0.88)';
    msg.style.color='#ff4444';
    msg.textContent='💀 게임 오버';
    sub.textContent='웨이브 '+wave+'에서 기지가 함락되었습니다.';
  } else {
    overlay.style.background='rgba(40,35,0,0.90)';
    msg.style.color='#FFD700';
    msg.textContent='🏆 게임 클리어!';
    sub.textContent='모든 웨이브를 막아냈습니다! 축하합니다!';
  }
  overlay.style.display='flex';
}

function resetGame(){
  document.getElementById('gameOverlay').style.display='none';
  document.getElementById('startScreen').style.display='flex';
  gold=100; hp=200; wave=1; timeLeft=60;
  gameOver=false; gameStarted=false;
  towers.length=0; enemies.length=0; dolls.length=0; equipped.length=0; wires.length=0;
  waveStarted=false; preparing=false; spawnCount=0;
  placingType=null; selectedSlot=-1; selectedTower=null;
  spawnTick=0; timeTick=0; wireCoolTick=0;
  buildWaveQueue();
  renderSlotBar(); renderEquip();
  setSpeed(1);
  const btn=document.getElementById('readyBtn');
  btn.disabled=false; btn.style.display='inline-block';
  document.getElementById('readyTimer').textContent='';
}

function renderSlotBar(){
  const bar=document.getElementById('slotBar');
  bar.innerHTML='';
  for(let i=0;i<MAX_SLOTS;i++){
    const type=equipped[i]||null;
    const meta=type?TOWER_META[type]:null;
    const isWireOnCool = type==='wire' && wireCoolTick>0;
    const slot=document.createElement('div');
    slot.style.cssText=
      'width:64px;height:64px;background:#222;'+
      'border:2px solid '+(selectedSlot===i&&type&&!isWireOnCool?'#0f0':isWireOnCool?'#f44':'#555')+';'+
      'border-radius:6px;display:flex;flex-direction:column;'+
      'align-items:center;justify-content:center;'+
      'cursor:'+(type&&!isWireOnCool?'pointer':'default')+';'+
      'position:relative;font-size:11px;color:#ccc;user-select:none;';
    const badge=document.createElement('span');
    badge.textContent=i+1;
    badge.style.cssText='position:absolute;top:2px;left:4px;font-size:9px;color:#888;';
    slot.appendChild(badge);
    if(meta){
      const icon=document.createElement('div');
      icon.textContent=meta.label; icon.style.fontSize='22px';
      const price=document.createElement('div');
      price.textContent='💰'+meta.cost;
      price.style.cssText='font-size:10px;color:#FFD700;margin-top:2px;';
      slot.appendChild(icon); slot.appendChild(price);
      if(isWireOnCool){
        const coolLabel=document.createElement('div');
        coolLabel.textContent=Math.ceil(wireCoolTick/60)+'s';
        coolLabel.style.cssText='position:absolute;bottom:2px;right:4px;font-size:9px;color:#f88;';
        slot.appendChild(coolLabel);
      }
      slot.onclick=()=>{ if(!isWireOnCool) selectSlot(i); };
    }else{
      const empty=document.createElement('div');
      empty.textContent='─'; empty.style.cssText='font-size:18px;color:#444;';
      slot.appendChild(empty);
    }
    bar.appendChild(slot);
  }
}

function selectSlot(i){
  if(!equipped[i]) return;
  if(equipped[i]==='wire'&&wireCoolTick>0) return;
  if(selectedSlot===i){ selectedSlot=-1; placingType=null; }
  else{ selectedSlot=i; placingType=equipped[i]; }
  renderSlotBar();
}

document.addEventListener('keydown',e=>{
  const n=parseInt(e.key);
  if(n>=1&&n<=MAX_SLOTS) selectSlot(n-1);
});

function equipTower(type){
  if(equipped.length>=MAX_SLOTS||equipped.includes(type)) return;
  equipped.push(type);
  renderEquip(); renderSlotBar();
}

function renderEquip(){
  const el=document.getElementById('equipList');
  el.innerHTML='';
  equipped.forEach((t,i)=>{
    const div=document.createElement('div');
    div.textContent=TOWER_META[t].label+' '+TOWER_META[t].name+' ❌';
    div.onclick=()=>{
      equipped.splice(i,1);
      if(placingType===t){ placingType=null; selectedSlot=-1; }
      renderEquip(); renderSlotBar();
    };
    el.appendChild(div);
  });
}

function toggleInventory(){
  const ui=document.getElementById('inventoryUI');
  ui.style.display=ui.style.display==='none'?'block':'none';
}

class Wire {
  constructor(x, y){
    this.x=x; this.y=y;
    this.stepCount=0; this.maxSteps=5;
    this.destroyed=false; this.radius=10;
    this.triggered=new Set();
    this.BLEED_TICKS=60*5; this.SLOW_TICKS=60*5;
  }
  update(){
    if(this.destroyed) return;
    for(let i=0;i<enemies.length;i++){
      const e=enemies[i];
      if(this.triggered.has(e)) continue;
      if(Math.hypot(e.x-this.x, e.y-this.y)<this.radius+6){
        this.triggered.add(e);
        this.stepCount++;
        e.slowTick  = Math.max(e.slowTick  ||0, this.SLOW_TICKS);
        e.bleedTick = Math.max(e.bleedTick ||0, this.BLEED_TICKS);
        if(this.stepCount>=this.maxSteps){ this.destroyed=true; break; }
      }
    }
    for(const e of this.triggered){ if(e.hp<=0) this.triggered.delete(e); }
  }
  draw(){
    if(this.destroyed) return;
    ctx.save();
    ctx.strokeStyle='#aaff44'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(this.x-8,this.y-8); ctx.lineTo(this.x+8,this.y+8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(this.x+8,this.y-8); ctx.lineTo(this.x-8,this.y+8); ctx.stroke();
    ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#aaff44'; ctx.font='9px sans-serif'; ctx.textAlign='center';
    ctx.fillText((this.maxSteps-this.stepCount)+'/'+this.maxSteps, this.x, this.y-14);
    ctx.restore();
  }
}

class Doll{
  constructor(){
    this.x=path[path.length-1].x; this.y=path[path.length-1].y;
    this.hp=250; this.maxHp=250; this.speed=0.8;
    this.dead=false; this.pathIndex=path.length-2;
  }
  update(){
    if(this.dead) return;
    if(this.pathIndex<0){ this.dead=true; return; }
    const node=path[this.pathIndex];
    const dx=node.x-this.x, dy=node.y-this.y;
    const dist=Math.hypot(dx,dy);
    if(dist<3){ this.pathIndex--; }
    else{ this.x+=dx/dist*this.speed; this.y+=dy/dist*this.speed; }
    enemies.forEach(e=>{
      if(this.dead) return;
      if(Math.hypot(e.x-this.x,e.y-this.y)<12){
        const eHp=e.hp; e.hp-=this.hp; this.hp-=eHp;
        if(this.hp<=0) this.dead=true;
      }
    });
  }
  draw(){
    if(this.dead) return;
    ctx.fillStyle='#cc88ff';
    ctx.beginPath(); ctx.arc(this.x,this.y,6,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#ff88ff'; ctx.lineWidth=1; ctx.stroke();
    ctx.textAlign='center'; ctx.fillStyle='white'; ctx.font='10px sans-serif';
    ctx.fillText(Math.floor(this.hp)+'/'+this.maxHp,this.x,this.y-12);
  }
}

class Enemy{
  constructor(type='wanderer'){
    this.type=type; this.x=path[0].x; this.y=path[0].y;
    this.i=1; this.hidden=false; this.isBoss=false;
    this.slowTick=0; this.bleedTick=0; this.bleedAccum=0;
    if(type==='wanderer'){ this.hp=50;  this.maxHp=50;  this.baseSpeed=1;   this.color='red'; }
    if(type==='thief'){    this.hp=25;  this.maxHp=25;  this.baseSpeed=2;   this.color='orange'; }
    if(type==='knight'){   this.hp=200; this.maxHp=200; this.baseSpeed=0.6; this.color='blue'; }
    if(type==='ninja'){    this.hp=100; this.maxHp=100; this.baseSpeed=2.3; this.color='purple'; this.hidden=true; }
    if(type==='golem'){    this.hp=500; this.maxHp=500; this.baseSpeed=0.4; this.color='gray';   this.isBoss=true; }
    if(type==='miniGolem'){this.hp=250; this.maxHp=250; this.baseSpeed=1;   this.color='lightgray'; }
    this.speed=this.baseSpeed;
  }
  update(){
    if(this.slowTick>0){
      this.slowTick--;
      this.speed=this.baseSpeed*0.7;
      if(this.slowTick<=0) this.speed=this.baseSpeed;
    }
    if(this.bleedTick>0){
      this.bleedTick--;
      this.bleedAccum++;
      if(this.bleedAccum>=60){ this.hp-=1; this.bleedAccum=0; }
    }
    const t=path[this.i];
    const dx=t.x-this.x, dy=t.y-this.y;
    const dist=Math.hypot(dx,dy);
    if(dist<2){
      this.i++;
      if(this.i>=path.length){ hp-=this.hp; this.hp=0; }
    }else{
      this.x+=dx/dist*this.speed; this.y+=dy/dist*this.speed;
    }
  }
  draw(){
    ctx.fillStyle=this.color;
    ctx.fillRect(this.x-6,this.y-6,12,12);
    if(this.slowTick>0||this.bleedTick>0){
      ctx.save();
      ctx.strokeStyle='#aaff44'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(this.x,this.y,9,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    ctx.textAlign='center';
    ctx.fillStyle='#aaa'; ctx.font='9px sans-serif';
    ctx.fillText(getEnemyInfo(this),this.x,this.y-25);
    ctx.fillStyle='white'; ctx.font='10px sans-serif';
    ctx.fillText(Math.floor(this.hp)+'/'+Math.floor(this.maxHp),this.x,this.y-14);
  }
}

function getEnemyInfo(e){
  if(e.type==='ninja')     return '은신';
  if(e.type==='golem')     return '보스/분열';
  if(e.type==='miniGolem') return '조각';
  return '';
}

let waveQueue=[];
function buildWaveQueue(){
  waveQueue=[];
  const w=wave;
  if(w===1)  for(let i=0;i<8;i++)  waveQueue.push('wanderer');
  else if(w===2)  for(let i=0;i<12;i++) waveQueue.push('wanderer');
  else if(w===3)  for(let i=0;i<5;i++)  waveQueue.push('thief');
  else if(w===4)  for(let i=0;i<10;i++) waveQueue.push('thief');
  else if(w===5)  for(let i=0;i<4;i++)  waveQueue.push('knight');
  else if(w===6){ for(let i=0;i<6;i++) waveQueue.push('knight'); for(let i=0;i<4;i++) waveQueue.push('thief'); }
  else if(w===7){ for(let i=0;i<8;i++) waveQueue.push('wanderer'); for(let i=0;i<8;i++) waveQueue.push('thief'); for(let i=0;i<8;i++) waveQueue.push('knight'); }
  else if(w===8){ for(let i=0;i<15;i++) waveQueue.push('wanderer'); for(let i=0;i<15;i++) waveQueue.push('thief'); for(let i=0;i<15;i++) waveQueue.push('knight'); }
  else if(w===9)  for(let i=0;i<10;i++) waveQueue.push('ninja');
  else if(w===10) waveQueue.push('golem');
  else if(w===11){ for(let i=0;i<15;i++) waveQueue.push('wanderer'); for(let i=0;i<10;i++) waveQueue.push('thief'); for(let i=0;i<5;i++) waveQueue.push('knight'); }
  else if(w===12){ for(let i=0;i<10;i++) waveQueue.push('ninja'); for(let i=0;i<10;i++) waveQueue.push('thief'); }
  else if(w===13) for(let i=0;i<15;i++) waveQueue.push('knight');
  else if(w===14) for(let i=0;i<20;i++) waveQueue.push('ninja');
  else if(w===15){ for(let i=0;i<10;i++) waveQueue.push('knight'); for(let i=0;i<15;i++) waveQueue.push('ninja'); }
  spawnLimit=waveQueue.length;
}

function spawnEnemy(){
  if(!waveStarted||spawnCount>=spawnLimit) return;
  enemies.push(new Enemy(waveQueue[spawnCount]));
  spawnCount++;
}

function readyWave(){
  if(preparing||waveStarted) return;
  preparing=true;
  const btn=document.getElementById('readyBtn');
  const timerEl=document.getElementById('readyTimer');
  btn.disabled=true;
  let count=5;
  timerEl.textContent=` (${count})`;
  const countdown=setInterval(()=>{
    count--;
    timerEl.textContent=` (${count})`;
    if(count<=0){
      clearInterval(countdown);
      timerEl.textContent='';
      waveStarted=true; preparing=false;
      btn.style.display='none';
    }
  },1000);
}

function nextWave(){
  if(wave>=15){
    if(spawnCount>=spawnLimit&&enemies.length===0) showOverlay('clear');
    return;
  }
  wave++; timeLeft=(wave===10)?120:60;
  spawnCount=0; spawnTick=0; timeTick=0;
  buildWaveQueue(); waveStarted=true;
}

class Tower{
  constructor(x,y,type){
    this.x=x; this.y=y; this.type=type;
    if(type==='fighter'){   this.range=50;  this.damage=25;  this.coolMax=20;  }
    if(type==='archer'){    this.range=120; this.damage=50;  this.coolMax=50;  }
    if(type==='cannon'){    this.range=100; this.damage=100; this.coolMax=90;  }
    if(type==='torch'){     this.range=130; this.damage=0;   this.coolMax=0;   }
    if(type==='puppeteer'){ this.range=0;   this.damage=0;   this.coolMax=1200; }
    this.baseRange=this.range; this.cool=0;
  }
  update(){
    if(this.type==='torch'){
      enemies.forEach(e=>{
        if(Math.hypot(e.x-this.x,e.y-this.y)<this.range&&e.type==='ninja') e.hidden=false;
      });
      towers.forEach(t=>{
        if(t===this||t.type==='torch') return;
        if(Math.hypot(t.x-this.x,t.y-this.y)<this.range) t.range=t.baseRange*1.05;
      });
      return;
    }
    if(this.type==='puppeteer'){
      if(this.cool>0){ this.cool--; return; }
      dolls.push(new Doll()); this.cool=this.coolMax; return;
    }
    if(this.cool>0){ this.cool--; return; }
    const target=enemies.find(e=>{
      if(!(Math.hypot(e.x-this.x,e.y-this.y)<this.range)) return false;
      if(e.type==='ninja'&&e.hidden) return false;
      return true;
    });
    if(!target) return;
    if(this.type==='cannon'){
      enemies.forEach(e=>{ if(Math.hypot(e.x-target.x,e.y-target.y)<40) e.hp-=this.damage; });
    }else{ target.hp-=this.damage; }
    this.cool=this.coolMax;
  }
  draw(){
    ctx.fillStyle=
      this.type==='fighter'?'cyan':
      this.type==='archer'?'yellow':
      this.type==='cannon'?'orange':
      this.type==='puppeteer'?'#cc88ff':'pink';
    ctx.beginPath(); ctx.arc(this.x,this.y,10,0,Math.PI*2); ctx.fill();
    if(selectedTower===this&&this.range>0){
      ctx.strokeStyle='white';
      ctx.beginPath(); ctx.arc(this.x,this.y,this.range,0,Math.PI*2); ctx.stroke();
    }
  }
}

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  const clicked=towers.find(t=>Math.hypot(t.x-x,t.y-y)<10);
  if(clicked){ selectedTower=clicked; return; }
  selectedTower=null;
  if(!placingType) return;
  const cost=TOWER_META[placingType]?.cost||0;
  if(gold<cost) return;

  if(placingType==='wire'){
    if(!isOnPath(x,y)) return;
    if(isTooCloseToWire(x,y)) return;
    if(wireCoolTick>0) return;
    wires.push(new Wire(x,y));
    gold-=cost;
    wireCoolTick=WIRE_COOLDOWN_FRAMES;
    placingType=null; selectedSlot=-1;
    renderSlotBar();
    return;
  }

  if(isOnPath(x,y)||isTooCloseToTower(x,y)) return;
  const isHill=hillZones.some(z=>Math.hypot(x-z.x,y-z.y)<z.r);
  if(placingType==='fighter'&&isHill) return;
  if(placingType==='archer'&&!isHill) return;
  if(placingType==='cannon'&&isHill) return;
  if(placingType==='torch'&&isHill) return;
  if(placingType==='puppeteer'&&isHill) return;
  if(!equipped.includes(placingType)) return;
  towers.push(new Tower(x,y,placingType));
  gold-=cost; placingType=null; selectedSlot=-1;
  renderSlotBar();
});

function update(){
  if(wireCoolTick>0) wireCoolTick--;

  wires.forEach(w=>w.update());
  for(let i=wires.length-1;i>=0;i--){
    if(wires[i].destroyed) wires.splice(i,1);
  }

  enemies.forEach(e=>e.update());
  towers.forEach(t=>t.update());
  dolls.forEach(d=>d.update());
  for(let i=dolls.length-1;i>=0;i--){
    if(dolls[i].dead) dolls.splice(i,1);
  }
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.hp<=0){
      if(e.type==='golem'){
        for(let j=0;j<3;j++){
          const m=new Enemy('miniGolem');
          m.x=e.x; m.y=e.y; m.i=e.i; enemies.push(m);
        }
      }
      if(e.type==='wanderer')       gold+=10;
      else if(e.type==='thief')     gold+=7;
      else if(e.type==='knight')    gold+=15;
      else if(e.type==='ninja')     gold+=15;
      else if(e.type==='golem')     gold+=35;
      else if(e.type==='miniGolem') gold+=20;
      enemies.splice(i,1);
    }
  }
}

function drawPathBlockPreview(){
  if(!placingType||placingType==='wire') return;
  ctx.save(); ctx.strokeStyle='rgba(255,0,0,0.35)'; ctx.lineWidth=PATH_BLOCK_RADIUS*2;
  ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y);
  for(const p of path) ctx.lineTo(p.x,p.y);
  ctx.stroke(); ctx.restore();
}

function drawWirePlacePreview(){
  if(placingType!=='wire') return;
  ctx.save();
  ctx.strokeStyle='rgba(170,255,68,0.4)'; ctx.lineWidth=PATH_BLOCK_RADIUS*2;
  ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y);
  for(const p of path) ctx.lineTo(p.x,p.y);
  ctx.stroke();
  const onPath=isOnPath(mouseX,mouseY);
  const tooClose=isTooCloseToWire(mouseX,mouseY);
  ctx.strokeStyle=(onPath&&!tooClose)?'#aaff44':'red';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(mouseX-8,mouseY-8); ctx.lineTo(mouseX+8,mouseY+8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mouseX+8,mouseY-8); ctx.lineTo(mouseX-8,mouseY+8); ctx.stroke();
  ctx.beginPath(); ctx.arc(mouseX,mouseY,10,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawTowerBlockPreview(){
  if(!placingType||placingType==='wire') return;
  ctx.save(); ctx.strokeStyle='rgba(255,0,0,0.35)'; ctx.lineWidth=2;
  towers.forEach(t=>{ ctx.beginPath(); ctx.arc(t.x,t.y,TOWER_BLOCK_RADIUS,0,Math.PI*2); ctx.stroke(); });
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,600,400);
  drawPathBlockPreview();
  ctx.strokeStyle='orange'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y);
  path.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.stroke();
  drawWirePlacePreview();
  drawTowerBlockPreview();
  ctx.fillStyle='rgba(255,255,0,0.3)';
  hillZones.forEach(z=>{ ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill(); });
  ctx.fillStyle='lime';
  ctx.beginPath(); ctx.arc(base.x,base.y,10,0,Math.PI*2); ctx.fill();
  wires.forEach(w=>w.draw());
  enemies.forEach(e=>e.draw());
  towers.forEach(t=>t.draw());
  dolls.forEach(d=>d.draw());
  if(placingType&&placingType!=='wire'){
    const rangeMap={fighter:50,archer:120,cannon:100,puppeteer:0,torch:130};
    const range=rangeMap[placingType]||0;
    const blocked=isTooCloseToTower(mouseX,mouseY)||isOnPath(mouseX,mouseY);
    ctx.strokeStyle=blocked?'red':'white';
    if(range>0){ ctx.beginPath(); ctx.arc(mouseX,mouseY,range,0,Math.PI*2); ctx.stroke(); }
    ctx.fillStyle=blocked?'red':'white';
    ctx.beginPath(); ctx.arc(mouseX,mouseY,10,0,Math.PI*2); ctx.fill();
  }
}

const goldEl=document.getElementById('gold');
const hpEl=document.getElementById('hp');
const waveEl=document.getElementById('wave');
const timeEl=document.getElementById('time');

function loop(){
  if(!gameStarted){ requestAnimationFrame(loop); return; }
  if(gameOver) return;

  for(let i=0;i<gameSpeed;i++){
    spawnTick++;
    if(spawnTick>=TICK_INTERVAL){ spawnTick=0; spawnEnemy(); }
    if(waveStarted){
      timeTick++;
      if(timeTick>=TICK_INTERVAL){
        timeTick=0; timeLeft--;
        if(timeLeft<=0||(spawnCount>=spawnLimit&&enemies.length===0)) nextWave();
      }
    }
    update();
    if(hp<=0){ showOverlay('lose'); return; }
  }

  draw();
  updateTowerCountUI();
  goldEl.textContent=gold;
  hpEl.textContent=hp;
  waveEl.textContent=wave;
  timeEl.textContent=timeLeft;
  const boss=enemies.find(e=>e.isBoss);
  document.getElementById('bossBar').style.display=boss?'block':'none';
  if(boss) document.getElementById('bossHp').style.width=(boss.hp/boss.maxHp*100)+'%';
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  gameStarted=true;
  buildWaveQueue(); waveStarted=false;
  document.getElementById('readyBtn').disabled=false;
  document.getElementById('readyBtn').style.display='inline-block';
  renderSlotBar();
  loop();
}

updateTowerCountUI();
loop();
</script>
